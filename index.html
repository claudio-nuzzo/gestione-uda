<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stradilab - Monitoraggio UDA</title>
    <style>
        :root {
            --primary: #1f3864;
            --accent: #2e5b9a;
            --bg: #fafafa;
            --text: #333333;
            --border: #dddddd;
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
        }
        .header {
            background-color: var(--primary);
            color: #ffffff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .header h1 {
            margin: 0;
            font-size: 20pt;
        }
        #statusMsg {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-weight: bold;
            background-color: #eee;
        }
        .controls {
            margin-bottom: 20px;
            background: #ffffff;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        select, input {
            padding: 8px;
            margin-right: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 10px;
            text-align: left;
            font-size: 10.5pt;
        }
        th {
            background-color: var(--primary);
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f6fa;
        }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            background: #e1ecf4;
            color: var(--accent);
            border-radius: 3px;
            font-size: 9pt;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>IIS ANTONIO STRADIVARI - Cruscotto Monitoraggio UDA</h1>
    </div>

    <div id="statusMsg">⏳ Sincronizzazione in corso...</div>

    <div class="controls">
        <label><strong>Filtra per Anno:</strong></label>
        <select id="filtroAnno" onchange="filtraUdaSito()">
            <option value="Tutti">Tutti gli anni</option>
            <option value="Prima">Prima</option>
            <option value="Seconda">Seconda</option>
            <option value="Terza">Terza</option>
            <option value="Quarta">Quarta</option>
            <option value="Quinta">Quinta</option>
        </select>

        <label><strong>Indirizzo:</strong></label>
        <select id="filtroIndirizzo" onchange="filtraUdaSito()">
            <option value="Tutti">Tutti</option>
            <option value="Moda">Moda</option>
            <option value="Arredo">Arredo</option>
        </select>

        <input type="text" id="cercaTesto" placeholder="Cerca materia o titolo..." onkeyup="filtraUdaSito()" style="width: 250px;">
    </div>

    <table id="tabellaUda">
        <thead>
            <tr>
                <th>Anno</th>
                <th>Indirizzo</th>
                <th>Materia</th>
                <th>Titolo UDA</th>
                <th>Competenze</th>
                <th>Abilità</th>
                <th>Conoscenze</th>
            </tr>
        </thead>
        <tbody id="corpoTabella">
            </tbody>
    </table>

    <script>
        const SHEET_ID = '11PTigCck5tH6F7KUYKzYb_ActbG670ygE91TkiANzJA';
        
        let databaseGlobaleUda = [];

        // Parsing CSV standard, lineare e pulito
        function parsingVeloceCsv(text) {
            const righe = text.split(/\r?\n/);
            const risultato = [];
            
            for (let i = 1; i < righe.length; i++) {
                const riga = righe[i];
                if (!riga.trim()) continue;
                
                const celle = [];
                let inQuotes = false;
                let cella = "";
                
                for (let j = 0; j < riga.length; j++) {
                    let char = riga[j];
                    if (char === '"') { 
                        inQuotes = !inQuotes; 
                    } else if (char === ',' && !inQuotes) { 
                        celle.push(cella.trim()); 
                        cella = ""; 
                    } else { 
                        cella += char; 
                    }
                }
                celle.push(cella.trim());
                const pulito = celle.map(c => c.replace(/^"|"$/g, '').trim());
                
                // Legge la riga basandosi sulla struttura standard del Master
                if (pulito.length >= 15) {
                    risultato.push({
                        id: pulito[0],
                        anno: pulito[3] || '—',       
                        indirizzo: pulito[4] || '—',  
                        materia: pulito[6] || '—',    
                        titolo: pulito[7] || '—',     
                        comp: pulito[12] || '—',       
                        abil: pulito[13] || '—',       
                        conosc: pulito[14] || '—'      
                    });
                }
            }
            return risultato;
        }

        // Caricamento diretto tramite endpoint CSV di Google Sheets (istantaneo)
        async function caricaDatiIstantanei() {
            const statusMsg = document.getElementById('statusMsg');
            const cacheBuster = "&nocache=" + new Date().getTime();
            const URL_DIRETTO = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv${cacheBuster}`;
            
            try {
                const response = await fetch(URL_DIRETTO);
                if (!response.ok) throw new Error();
                const csvText = await response.text();
                
                databaseGlobaleUda = parsingVeloceCsv(csvText);
                
                statusMsg.style.background = "#eef5ee";
                statusMsg.style.color = "#2e5b9a";
                statusMsg.innerHTML = `✅ <strong>Database sincronizzato!</strong> Rilevate ${databaseGlobaleUda.length} UDA nel Master.`;
                
                filtraUdaSito();
            } catch (e) {
                statusMsg.style.background = "#fff3cd";
                statusMsg.style.color = "#856404";
                statusMsg.innerText = "⚠️ Errore di sincronizzazione. Verifica la connessione o i permessi del foglio.";
            }
        }

        // Logica di filtraggio a schermo
        function filtraUdaSito() {
            const filtroAnno = document.getElementById('filtroAnno').value;
            const filtroIndirizzo = document.getElementById('filtroIndirizzo').value;
            const cercaTesto = document.getElementById('cercaTesto').value.toLowerCase();
            const corpo = document.getElementById('corpoTabella');
            
            corpo.innerHTML = "";
            
            const datiFiltrati = databaseGlobaleUda.filter(uda => {
                if (filtroAnno !== "Tutti" && uda.anno !== filtroAnno) return false;
                if (filtroIndirizzo !== "Tutti" && uda.indirizzo !== filtroIndirizzo) return false;
                
                if (cercaTesto) {
                    const inMateria = uda.materia.toLowerCase().includes(cercaTesto);
                    const inTitolo = uda.titolo.toLowerCase().includes(cercaTesto);
                    if (!inMateria && !inTitolo) return false;
                }
                return true;
            });
            
            if (datiFiltrati.length === 0) {
                corpo.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#999;">Nessuna UDA trovata.</td></tr>`;
                return;
            }
            
            datiFiltrati.forEach(uda => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${uda.anno}</strong></td>
                    <td><span class="badge">${uda.indirizzo}</span></td>
                    <td>${uda.materia}</td>
                    <td>${uda.titolo}</td>
                    <td><code>${uda.comp}</code></td>
                    <td><code>${uda.abil}</code></td>
                    <td><code>${uda.conosc}</code></td>
                `;
                corpo.appendChild(tr);
            });
        }

        window.onload = caricaDatiIstantanei;
    </script>
</body>
</html>
