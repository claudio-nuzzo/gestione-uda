<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stradilab — Generatore Piani UDA Universale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --ink: #1a1814;
      --ink-soft: #5a5550;
      --ink-muted: #9a9590;
      --accent: #2d5a3d;
      --border: #e2ddd8;
      --radius: 2px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      padding: 2rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--surface);
      padding: 3rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .official-header {
      border-bottom: 2px solid var(--accent);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 400;
      margin: 0.5rem 0;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .grid-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-soft);
      display: block;
      margin-bottom: 0.5rem;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #c8c3bc;
      background: var(--surface);
      font-family: inherit;
      color: var(--ink);
      box-sizing: border-box;
      border-radius: var(--radius);
    }

    .status-message {
      padding: 1rem;
      background: #faf7f2;
      border: 1px solid var(--border);
      color: var(--ink-soft);
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      border-radius: var(--radius);
      font-weight: 500;
    }

    .radio-group {
      margin: 1.5rem 0;
      padding: 1rem 0;
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
    }

    .radio-option {
      display: inline-flex;
      align-items: center;
      margin-right: 2rem;
      cursor: pointer;
    }

    .radio-option input {
      margin-right: 0.5rem;
      accent-color: var(--accent);
    }

    .uda-selection-area {
      margin-top: 1.5rem;
    }

    .uda-item {
      display: flex;
      align-items: flex-start;
      padding: 0.85rem;
      border-bottom: 1px solid var(--border);
    }

    .uda-item:hover {
      background: #faf9f6;
    }

    .btn-submit {
      background: var(--accent);
      color: var(--surface);
      border: none;
      padding: 1.2rem 2rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-top: 2rem;
      transition: background 0.2s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.95rem;
    }

    .btn-submit:hover {
      background: #1e3d29;
    }

    /* Elemento nascosto per caricare l'immagine del logo da passare a jsPDF */
    #hiddenLogo {
      display: none;
    }
  </style>
</head>
<body>

  <img id="hiddenLogo" src="logo scuola lungo.jpg" alt="Logo Ministeriale Stradivari" />

  <div class="container">
    <div class="official-header">
      <div class="subtitle">Stradilab — Sperimentazione Didattica</div>
      <h1>Generatore Piani Annuali delle UDA</h1>
    </div>

    <div id="statusMsg" class="status-message">🔄 Sincronizzazione in corso con il foglio Google Master...</div>

    <form id="udaPlanForm">
      <div class="grid-form">
        <div>
          <label for="annoCorso">Classe (Anno di corso)</label>
          <select id="annoCorso" onchange="filtraUdaSito()">
            <option value="Prima">Classe Prima (1)</option>
            <option value="Seconda">Classe Seconda (2)</option>
            <option value="Terza">Classe Terza (3)</option>
            <option value="Quarta">Classe Quarta (4)</option>
            <option value="Quinta">Classe Quinta (5)</option>
          </select>
        </div>

        <div>
          <label for="sezione">Sezione</label>
          <input type="text" id="sezione" placeholder="es. A, B, MODA" required style="text-transform: uppercase;" />
        </div>

        <div>
          <label for="indirizzo">Indirizzo di Studio</label>
          <select id="indirizzo" onchange="filtraUdaSito()">
            <option value="Moda">Moda (Made in Italy)</option>
            <option value="Arredo">Arredo (Legno/Design)</option>
          </select>
        </div>

        <div>
          <label for="annoScolastico">Anno Scolastico</label>
          <select id="annoScolastico" required>
            <option value="2025/2026">2025/2026</option>
            <option value="2026/2027">2026/2027</option>
            <option value="2027/2028">2027/2028</option>
          </select>
        </div>
      </div>

      <div class="radio-group">
        <label>Modalità di Selezione</label>
        <label class="radio-option">
          <input type="radio" name="strategiaUda" value="tutte" checked onclick="toggleSelezioneVisiva(false)" />
          Seleziona Tutto (Output Completo Istituzionale)
        </label>
        <label class="radio-option">
          <input type="radio" name="strategiaUda" value="personalizza" onclick="toggleSelezioneVisiva(true)" />
          Personalizza / Deseleziona elementi singoli
        </label>
      </div>

      <div id="udaSelectionArea" class="uda-selection-area">
        <label>Elenco UDA caricate dal foglio per la selezione corrente:</label>
        <div id="listaUdaDinamica"></div>
      </div>

      <button type="submit" class="btn-submit">💾 Genera e Scarica PDF Ufficiale</button>
    </form>
  </div>

  <script>
    let databaseGlobaleUda = [];
    
    // URL di esportazione CSV con fallbacks multipli anti-CORS per evitare blocchi del browser
    const SHEET_ID = "11PTigCck5tH6F7KUYKzYb_ActbG670ygE91TkiANzJA";
    const GID = "1891931441";
    const DIRECT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
    const CORS_PROXY_URL = `https://api.allorigins.win/raw?url=${encodeURIComponent(DIRECT_URL)}`;

    window.onload = function() {
      caricaDatiDalFoglio();
    };

    async function caricaDatiDalFoglio() {
      const statusMsg = document.getElementById('statusMsg');
      // Tentativo 1: Chiamata tramite Proxy per evitare blocchi CORS locali e accelerare il recupero
      try {
        const response = await fetch(CORS_PROXY_URL);
        if (!response.ok) throw new Error();
        const csvText = await response.text();
        elaboraCsv(csvText, "Ottimizzata (Cloud Proxy)");
      } catch (e) {
        // Tentativo 2: Fallback diretto se il proxy ha problemi
        try {
          const responseDirect = await fetch(DIRECT_URL);
          if (!responseDirect.ok) throw new Error();
          const csvTextDirect = await responseDirect.text();
          elaboraCsv(csvTextDirect, "Diretta (Google Cloud)");
        } catch (err2) {
          statusMsg.style.background = "#fdeeed";
          statusMsg.style.color = "#c0392b";
          statusMsg.innerHTML = `⚠️ Errore di sincronizzazione. Verifica che il foglio sia impostato su <strong>"Chiunque abbia il link può visualizzare"</strong> nelle opzioni di condivisione di Google Drive.`;
        }
      }
    }

    function elaboraCsv(csvText, modalita) {
      const statusMsg = document.getElementById('statusMsg');
      databaseGlobaleUda = parsingCsvGoogleMaster(csvText);
      statusMsg.style.background = "#eef5ee";
      statusMsg.style.color = "var(--accent)";
      statusMsg.innerText = `✅ Connessione riuscita [Mod: ${modalita}]. Sincronizzate ${databaseGlobaleUda.length} righe UDA dal foglio Google.`;
      filtraUdaSito();
    }

    // Mappatura ad altissima precisione basata sulle colonne reali del foglio UDA_MASTER
    function parsingCsvGoogleMaster(text) {
      const righe = text.split(/\r?\n/);
      const risultato = [];
      
      for (let i = 1; i < righe.length; i++) {
        const rigaAttuale = righe[i];
        if (!rigaAttuale.trim()) continue;
        
        const celle = [];
        let dentroVirgolette = false;
        let cellaCorrente = "";
        
        for (let j = 0; j < rigaAttuale.length; j++) {
          let char = rigaAttuale[j];
          if (char === '"') {
            dentroVirgolette = !dentroVirgolette;
          } else if (char === ',' && !dentroVirgolette) {
            celle.push(cellaCorrente.trim());
            cellaCorrente = "";
          } else {
            cellaCorrente += char;
          }
        }
        celle.push(cellaCorrente.trim());
        
        const pulito = celle.map(c => c.replace(/^"|"$/g, '').trim());
        
        // Struttura corretta delle colonne:
        // Colonna D (Indice 3): Anno Corso | Colonna E (Indice 4): Indirizzo 
        // Colonna G (Indice 6): Materia    | Colonna H (Indice 7): Titolo UDA
        // Colonna M (Indice 12): Competenze | Colonna N (Indice 13): Abilità | Colonna O (Indice 14): Conoscenze
        if (pulito.length >= 15) {
          risultato.push({
            id: pulito[0] || "UDA_" + i,
            anno: pulito[3],       
            indirizzo: pulito[4],  
            materia: pulito[6],    
            titolo: pulito[7],     
            comp: pulito[12] || '—',       
            abil: pulito[13] || '—',       
            conosc: pulito[14] || '—'      
          });
        }
      }
      return risultato;
    }

    function toggleSelezioneVisiva(mostraOpzioni) {
      if(!mostraOpzioni) {
        const checkboxes = document.querySelectorAll('.uda-checkbox');
        checkboxes.forEach(cb => cb.checked = true);
      }
    }

    function filtraUdaSito() {
      const anno = document.getElementById('annoCorso').value;
      const indirizzo = document.getElementById('indirizzo').value;
      const container = document.getElementById('listaUdaDinamica');
      
      const udaFiltrate = databaseGlobaleUda.filter(u => 
        u.anno.toLowerCase().trim() === anno.toLowerCase().trim() && 
        u.indirizzo.toLowerCase().trim() === indirizzo.toLowerCase().trim()
      );
      
      container.innerHTML = '';
      if(udaFiltrate.length === 0) {
        container.innerHTML = '<p style="font-size:0.9rem; color:var(--ink-muted); padding: 1rem 0;">Nessun dato trovato nel foglio per questa combinazione. Verifica i filtri o inserisci nuove righe nel foglio Google.</p>';
        return;
      }

      udaFiltrate.forEach(u => {
        const item = document.createElement('div');
        item.className = 'uda-item';
        item.innerHTML = `
          <label style="display:flex; align-items:flex-start; text-transform:none; font-size:0.95rem; color:var(--ink); cursor:pointer; width:100%;">
            <input type="checkbox" value="${u.id}" class="uda-checkbox" checked style="margin-right: 14px; margin-top: 4px; transform: scale(1.1);">
            <div>
              <strong style="color:var(--accent); text-transform: uppercase; font-size:0.85rem;">[${u.materia}]</strong><br>
              <span style="font-weight:500;">${u.titolo}</span>
              <div style="font-size:0.8rem; color:var(--ink-soft); margin-top:4px; line-height: 1.4;">
                <strong>Competenze:</strong> ${u.comp}<br>
                <strong>Abilità:</strong> ${u.abil}<br>
                <strong>Conoscenze:</strong> ${u.conosc}
              </div>
            </div>
          </label>
        `;
        container.appendChild(item);
      });
    }

    document.getElementById('udaPlanForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const { jsPDF } = window.jspdf;
      
      // Orientamento Orizzontale (Landscape) per contenere l'output analitico completissimo
      const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

      const annoCorso = document.getElementById('annoCorso').value;
      const sezione = document.getElementById('sezione').value.toUpperCase();
      const indirizzo = document.getElementById('indirizzo').value;
      const annoScolastico = document.getElementById('annoScolastico').value;

      const checkboxes = document.querySelectorAll('.uda-checkbox:checked');
      const idsSelezionati = Array.from(checkboxes).map(cb => cb.value);
      const udaDaStampare = databaseGlobaleUda.filter(u => idsSelezionati.includes(u.id));

      if (udaDaStampare.length === 0) {
        alert("Seleziona almeno un'UDA prima di generare il documento.");
        return;
      }

      // 1. Rendering Esclusivo dell'Intestazione Istituzionale (Logo Scuola Lungo) nel PDF
      const imgLogo = document.getElementById('hiddenLogo');
      try {
        doc.addImage(imgLogo, 'JPEG', 15, 10, 267, 24); // Adattato per occupare la larghezza orizzontale
      } catch (err) {
        doc.setFont("Helvetica", "bold");
        doc.setFontSize(14);
        doc.text("I.I.S. ANTONIO STRADIVARI — CREMONA", 15, 18);
      }

      // Linea verde formale sotto-logo
      doc.setDrawColor(45, 90, 61);
      doc.setLineWidth(0.8);
      doc.line(15, 37, 282, 37);

      // 2. Metadati Istituzionali
      doc.setFont("Helvetica", "normal");
      doc.setFontSize(10);
      doc.setTextColor(90, 85, 80);
      doc.text(`Anno Scolastico: ${annoScolastico}`, 15, 44);
      doc.text(`Indirizzo di studio: Istruzione Professionale Made in Italy — Opzione: ${indirizzo}`, 15, 49);
      
      doc.setFont("Helvetica", "bold");
      doc.setFontSize(12);
      doc.setTextColor(26, 24, 20);
      doc.text(`PIANO FORMATIVO INTEGRALE DELLE UNITA' DI APPRENDIMENTO (UDA) — CLASSE ${annoCorso.toUpperCase()} SEZ. ${sezione}`, 15, 57);

      // 3. Generazione Righe Mappate per la Griglia Completa
      const righeTabella = udaDaStampare.map((u, index) => [
        `${index + 1}`,
        u.materia,
        u.titolo,
        u.comp,
        u.abil,
        u.conosc
      ]);

      doc.autoTable({
        startY: 63,
        head: [['N°', 'Materia / Insegnamento', 'Titolo Unità di Apprendimento (UDA)', 'Competenze', 'Abilità', 'Conoscenze']],
        body: righeTabella,
        headStyles: { fillColor: [45, 90, 61], fontSize: 9.5, fontStyle: 'bold' },
        bodyStyles: { fontSize: 8, textColor: [26, 24, 20], valign: 'top' },
        columnStyles: {
          0: { cellWidth: 10, halign: 'center' },
          1: { cellWidth: 50 },
          2: { cellWidth: 72 },
          3: { cellWidth: 40 },
          4: { cellWidth: 48 },
          5: { cellWidth: 45 }
        },
        margin: { left: 15, right: 15 },
        styles: { overflow: 'paragraph' }
      });

      // 4. Sezione Firme: Solo ed esclusivamente il Coordinatore di Classe
      const finalY = doc.lastAutoTable.finalY + 20;
      doc.setFont("Helvetica", "italic");
      doc.setFontSize(10);
      doc.setTextColor(26, 24, 20);
      doc.text("Il Coordinatore di Classe", 215, finalY);
      doc.line(215, finalY + 12, 275, finalY + 12);

      // Download automatico del file
      doc.save(`Piano_UDA_${annoScolastico.replace('/', '_')}_${annoCorso}_${sezione}.pdf`);
    });
  </script>
</body>
</html>
