<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stradilab — Generatore Piani UDA Universale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  
  <!-- Librerie per la generazione istantanea del PDF in locale -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --ink: #1a1814;
      --ink-soft: #5a5550;
      --ink-muted: #9a9590;
      --accent: #2d5a3d;
      --border: #e2ddd8;
      --radius: 2px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      padding: 2rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--surface);
      padding: 3rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .official-header {
      border-bottom: 2px solid var(--accent);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .official-header img {
      max-width: 100%;
      height: auto;
      max-height: 85px; 
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 400;
      margin: 1rem 0;
      color: var(--accent);
    }

    .grid-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-soft);
      display: block;
      margin-bottom: 0.5rem;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-strong, #c8c3bc);
      background: var(--surface);
      font-family: inherit;
      color: var(--ink);
      box-sizing: border-box;
      border-radius: var(--radius);
    }

    .status-message {
      padding: 1rem;
      background: #eef5ee;
      border: 1px solid #cce3cc;
      color: var(--accent);
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      display: none;
    }

    .radio-group {
      margin: 1.5rem 0;
      padding: 1rem 0;
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
    }

    .radio-option {
      display: inline-flex;
      align-items: center;
      margin-right: 2rem;
      cursor: pointer;
    }

    .radio-option input {
      margin-right: 0.5rem;
      accent-color: var(--accent);
    }

    .uda-selection-area {
      margin-top: 1.5rem;
    }

    .uda-item {
      display: flex;
      align-items: flex-start;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .uda-item:hover {
      background: #faf9f6;
    }

    .btn-submit {
      background: var(--accent);
      color: var(--surface);
      border: none;
      padding: 1rem 2rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-top: 2rem;
      transition: background 0.2s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .btn-submit:hover {
      background: #1e3d29;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="official-header">
      <img id="scuolaLogo" src="logo scuola documenti.jpg" alt="I.I.S. Antonio Stradivari Cremona" />
      <h1>Generatore Piano Annuale delle UDA</h1>
    </div>

    <div id="statusMsg" class="status-message">🔄 Caricamento del database centralizzato delle UDA in corso...</div>

    <form id="udaPlanForm">
      <div class="grid-form">
        <div>
          <label for="annoCorso">Classe (Anno di corso)</label>
          <select id="annoCorso" required onchange="filtraUdaSito()">
            <option value="Prima">Classe Prima (1)</option>
            <option value="Seconda">Classe Seconda (2)</option>
            <option value="Terza">Classe Terza (3)</option>
            <option value="Quarta">Classe Quarta (4)</option>
            <option value="Quinta">Classe Quinta (5)</option>
          </select>
        </div>

        <div>
          <label for="sezione">Sezione</label>
          <input type="text" id="sezione" placeholder="es. A, B, MODA" required style="text-transform: uppercase;" />
        </div>

        <div>
          <label for="indirizzo">Indirizzo di Studio</label>
          <select id="indirizzo" required onchange="filtraUdaSito()">
            <option value="Moda">Moda (Made in Italy)</option>
            <option value="Arredo">Arredo (Legno/Design)</option>
          </select>
        </div>

        <div>
          <label for="annoScolastico">Anno Scolastico</label>
          <select id="annoScolastico" required>
            <option value="2025/2026">2025/2026</option>
            <option value="2026/2027">2026/2027</option>
            <option value="2027/2028">2027/2028</option>
          </select>
        </div>
      </div>

      <div class="radio-group">
        <label>Modalità di Selezione</label>
        <label class="radio-option">
          <input type="radio" name="strategiaUda" value="tutte" checked onclick="toggleSelezioneVisiva(false)" />
          Seleziona Tutto in Automatico (Output Completo)
        </label>
        <label class="radio-option">
          <input type="radio" name="strategiaUda" value="personalizza" onclick="toggleSelezioneVisiva(true)" />
          Personalizza / Deseleziona elementi singoli
        </label>
      </div>

      <div id="udaSelectionArea" class="uda-selection-area">
        <label>Elenco UDA disponibili per la classe e l'indirizzo selezionati:</label>
        <div id="listaUdaDinamica"></div>
      </div>

      <button type="submit" class="btn-submit">💾 Genera e Scarica PDF Ufficiale</button>
    </form>
  </div>

  <script>
    // Memoria locale dell'applicazione che conterrà TUTTE le UDA caricate dal Cloud/Database
    let databaseGlobaleUda = [];

    // Al caricamento, interroghiamo l'endpoint di Cloudflare o Google Sheets
    window.onload = async function() {
      const statusMsg = document.getElementById('statusMsg');
      statusMsg.style.display = 'block';
      
      try {
        // Quando avrai attivo il worker, inseriremo qui l'URL reale (es: /api/get-uda)
        // Per ora simula il recupero dei dati completi senza bloccare lo sviluppo
        const response = await fetch('/api/get-uda-database').catch(() => null);
        if (response && response.ok) {
          databaseGlobaleUda = await response.json();
          statusMsg.innerText = "✅ Database UDA sincronizzato con successo dal Cloud!";
        } else {
          // Fallback di sviluppo temporaneo per non mostrare lo schermo vuoto
          databaseGlobaleUda = recuperaDatiEsempioIniziali();
          statusMsg.innerHTML = "⚠️ Esecuzione in modalità locale. Pronto a ricevere la Function Cloudflare.";
        }
      } catch (e) {
        databaseGlobaleUda = recuperaDatiEsempioIniziali();
        statusMsg.innerText = "⚠️ Errore di rete. Caricate UDA locali predefinite.";
      }
      
      filtraUdaSito();
    };

    function toggleSelezioneVisiva(mostraOpzioni) {
      const checkboxes = document.querySelectorAll('.uda-checkbox');
      checkboxes.forEach(cb => {
        if(!mostraOpzioni) cb.checked = true; // Se l'utente vuole tutto completo, forza la spunta su tutte
      });
    }

    function filtraUdaSito() {
      const anno = document.getElementById('annoCorso').value;
      const indirizzo = document.getElementById('indirizzo').value;
      const container = document.getElementById('listaUdaDinamica');
      
      const udaFiltrate = databaseGlobaleUda.filter(u => u.anno === anno && u.indirizzo === indirizzo);
      
      container.innerHTML = '';
      if(udaFiltrate.length === 0) {
        container.innerHTML = '<p style="font-size:0.9rem; color:var(--ink-muted); padding: 1rem 0;">Nessun dato registrato sul database per questa combinazione. Configura il foglio Google master per questa classe.</p>';
        return;
      }

      udaFiltrate.forEach(u => {
        const item = document.createElement('div');
        item.className = 'uda-item';
        item.innerHTML = `
          <label style="display:flex; align-items:center; text-transform:none; font-size:0.95rem; color:var(--ink); cursor:pointer; width:100%;">
            <input type="checkbox" value="${u.id}" class="uda-checkbox" checked style="margin-right: 14px; transform: scale(1.1);">
            <div>
              <strong style="color:var(--accent); text-transform: uppercase; font-size:0.85rem;">[${u.materia}]</strong><br>
              <span style="font-weight:500;">${u.titolo}</span>
              <div style="font-size:0.8rem; color:var(--ink-soft); margin-top:3px;">
                C: ${u.comp || '—'} | A: ${u.abil || '—'} | C: ${u.conosc || '—'}
              </div>
            </div>
          </label>
        `;
        container.appendChild(item);
      });
    }

    document.getElementById('udaPlanForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const { jsPDF } = window.jspdf;
      
      // CONFIGURAZIONE PAESAGGIO (LANDSCAPE) PER OUTPUT COMPLETISSIMO
      const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

      const annoCorso = document.getElementById('annoCorso').value;
      const sezione = document.getElementById('sezione').value.toUpperCase();
      const indirizzo = document.getElementById('indirizzo').value;
      const annoScolastico = document.getElementById('annoScolastico').value;

      // Recupera solo le UDA che hanno il check attivo nel pannello
      const checkboxes = document.querySelectorAll('.uda-checkbox:checked');
      const idsSelezionati = Array.from(checkboxes).map(cb => cb.value);
      const udaDaStampare = databaseGlobaleUda.filter(u => idsSelezionati.includes(u.id));

      if (udaDaStampare.length === 0) {
        alert("Seleziona almeno un'UDA dall'elenco visivo prima di procedere alla stampa.");
        return;
      }

      // 1. Rendering Intestazione Grafica Istituzionale
      const imgLogo = document.getElementById('scuolaLogo');
      try {
        doc.addImage(imgLogo, 'JPEG', 15, 12, 195, 23);
      } catch (err) {
        doc.setFont("Helvetica", "bold");
        doc.setFontSize(14);
        doc.text("I.I.S. ANTONIO STRADIVARI — CREMONA", 15, 18);
      }

      // Riga ornamentale verde istituzionale
      doc.setDrawColor(45, 90, 61);
      doc.setLineWidth(0.8);
      doc.line(15, 38, 282, 38);

      // 2. Metadati del Documento
      doc.setFont("Helvetica", "normal");
      doc.setFontSize(10);
      doc.setTextColor(90, 85, 80);
      doc.text(`Anno Scolastico: ${annoScolastico}`, 15, 45);
      doc.text(`Indirizzo di studio: Istruzione Professionale Made in Italy — Opzione: ${indirizzo}`, 15, 50);
      
      doc.setFont("Helvetica", "bold");
      doc.setFontSize(13);
      doc.setTextColor(26, 24, 20);
      doc.text(`PIANO FORMATIVO INTEGRALE DELLE UNITA' DI APPRENDIMENTO (UDA) — CLASSE ${annoCorso.toUpperCase()} SEZ. ${sezione}`, 15, 59);

      // 3. Elaborazione Righe Tabella (Senza Ore, con competenze separate)
      const righeTabella = udaDaStampare.map((u, index) => [
        `${index + 1}`,
        u.materia,
        u.titolo,
        u.comp || '—',
        u.abil || '—',
        u.conosc || '—'
      ]);

      // Generazione griglia AutoTable con ottimizzazione spazi
      doc.autoTable({
        startY: 65,
        head: [['N°', 'Materia / Insegnamento', 'Titolo Unità di Apprendimento (UDA)', 'Competenze', 'Abilità', 'Conoscenze']],
        body: righeTabella,
        headStyles: { fillColor: [45, 90, 61], fontSize: 9.5, fontStyle: 'bold' },
        bodyStyles: { fontSize: 8.5, textColor: [26, 24, 20], valign: 'top' },
        columnStyles: {
          0: { cellWidth: 10, halign: 'center' },
          1: { cellWidth: 55 },
          2: { cellWidth: 80 },
          3: { cellWidth: 35 },
          4: { cellWidth: 45 },
          5: { cellWidth: 42 }
        },
        margin: { left: 15, right: 15 },
        styles: { overflow: 'paragraph' }
      });

      // 4. Sezione Firme AUTORIZZATE: Solo ed esclusivamente il Coordinatore
      const finalY = doc.lastAutoTable.finalY + 20;
      doc.setFont("Helvetica", "italic");
      doc.setFontSize(10);
      doc.setTextColor(26, 24, 20);
      doc.text("Il Coordinatore di Classe", 215, finalY);
      doc.line(215, finalY + 12, 275, finalY + 12);

      // Download immediato del file generato sul client
      doc.save(`Piano_UDA_${annoScolastico.replace('/', '_')}_${annoCorso}_${sezione}.pdf`);
    });

    // Sementi dati di esempio per la simulazione iniziale locale (Prima Moda)
    function recuperaDatiEsempioIniziali() {
      return [
        { id: "M1", anno: "Prima", indirizzo: "Moda", materia: "LINGUA E LETTERATURA ITALIANA", titolo: "UDA 1 – Analisi grammaticale", comp: "2A", abil: "A.ITA.2.5", conosc: "C.ITA.3" },
        { id: "M2", anno: "Prima", indirizzo: "Moda", materia: "LINGUA E LETTERATURA ITALIANA", titolo: "UDA 2 – Narrativa (racconto e romanzo)", comp: "2A", abil: "A.ITA.2.5", conosc: "C.ITA.3" },
        { id: "M3", anno: "Prima", indirizzo: "Moda", materia: "LINGUA E LETTERATURA ITALIANA", titolo: "UDA 3 – Il genere epico (Iliade, Odissea, Eneide)", comp: "1, 2", abil: "A.ITA.1.1, A.ITA.1.2", conosc: "C.ITA.1, C.ITA.5" },
        { id: "M4", anno: "Prima", indirizzo: "Moda", materia: "STORIA E GEOGRAFIA", titolo: "UDA 1 – Storia greca (antiche civiltà, poleis, ellenismo)", comp: "1A, 4A", abil: "A.STO.1.1, A.STO.4.1", conosc: "C.STO.1, C.STO.2" },
        { id: "M5", anno: "Prima", indirizzo: "Moda", materia: "LINGUA INGLESE", titolo: "UDA 1 – This is me", comp: "5A", abil: "A.ING.5.3, A.ING.5.5", conosc: "C.ING.1, C.ING.2" }
      ];
    }
  </script>
</body>
</html>
